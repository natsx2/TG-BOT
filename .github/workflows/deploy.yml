name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy (API)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_API != '' }}
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_API }}" | jq .

      - name: Trigger Render deploy (Bot)
        if: ${{ secrets.RENDER_DEPLOY_HOOK_BOT != '' }}
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_BOT }}" | jq .
