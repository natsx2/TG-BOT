databases:
  - name: brutetg-db
    plan: free
    databaseName: brutetg
    user: brutetg_admin

services:
  - type: web
    name: brutetg-api
    env: node
    plan: free
    buildCommand: >
      npm install -g pnpm@10 &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db run push &&
      pnpm --filter @workspace/admin-panel run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: brutetg-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_TOKEN
        value: 8628734415:AAEHSsobdXZ_kGjUC7VdqDE2csSFZp7gPvw
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin321

  - type: worker
    name: brutetg-bot
    env: python
    plan: free
    buildCommand: pip install -r bot/requirements.txt
    startCommand: python bot/bot.py
    envVars:
      - key: BOT_TOKEN
        value: 8628734415:AAEHSsobdXZ_kGjUC7VdqDE2csSFZp7gPvw
      - key: DATABASE_URL
        fromDatabase:
          name: brutetg-db
          property: connectionString
      - key: API_BASE_URL
        fromService:
          name: brutetg-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
