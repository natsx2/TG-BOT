services:
  - type: web
    name: tg-bot-api
    env: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: tg-bot-admin
    env: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/admin-panel run build
    startCommand: npx serve -s artifacts/admin-panel/dist -l 10000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
