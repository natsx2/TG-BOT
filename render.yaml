services:
  # ─── API + Admin Panel (Web Service) ──────────────────────────────────────
  - type: web
    name: brutetg-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db run push &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin000
  # ─── Telegram Bot (Background Worker) ─────────────────────────────────────
  - type: worker
    name: brutetg-bot
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r bot/requirements.txt
    startCommand: python bot/bot.py
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        value: "https://brutetg-api.onrender.com/api"
