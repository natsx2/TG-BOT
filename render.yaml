services:
  - type: web
    name: tg-bot-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PORT
        value: "10000"
      - key: REPLIT_DOMAINS
        sync: false
