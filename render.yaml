services:
  - type: web
    name: brutetg-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/admin-panel run build && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: brutetg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  - type: worker
    name: brutetg-bot
    env: python
    plan: free
    region: oregon
    rootDir: bot
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        fromService:
          name: brutetg-api
          type: web
          property: host
          envVarName: API_BASE_URL

databases:
  - name: brutetg-db
    databaseName: brutetg
    user: brutetg
    plan: free
    region: oregon
